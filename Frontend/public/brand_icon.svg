<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    BRAND ICON - 100x100
    ITE: all letters white
    Shield: navy gradient
  -->
  <defs>
    <linearGradient id="sg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#0059b3"/>
      <stop offset="100%" stop-color="#002d5a"/>
    </linearGradient>
    <linearGradient id="sh" x1="0%" y1="0%" x2="10%" y2="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#001a3d" flood-opacity="0.35"/>
    </filter>
    <style>.lf{font-family:'Inter','Roboto',Arial,sans-serif;}</style>
  </defs>

  <!-- Shield body -->
  <path d="M50 8 L88 20 L88 55 Q88 78 50 93 Q12 78 12 55 L12 20 Z"
        fill="url(#sg)" filter="url(#ds)"/>
  <path d="M50 8 L88 20 L88 55 Q88 78 50 93 Q12 78 12 55 L12 20 Z"
        fill="url(#sh)"/>
  <!-- Inner inset border -->
  <path d="M50 13 L83 24 L83 55 Q83 74 50 87 Q17 74 17 55 L17 24 Z"
        fill="none" stroke="white" stroke-width="0.8" opacity="0.18"/>
  <!-- Green accent bar -->
  <rect x="12" y="20" width="76" height="3.5" fill="#00A859" rx="0.5"/>

  <!-- ITE: all white -->
  <text x="50" y="69" class="lf"
        font-size="26" font-weight="800"
        fill="white" text-anchor="middle" letter-spacing="4">ITE</text>
  <line x1="28" y1="76" x2="72" y2="76" stroke="white" stroke-width="0.8" opacity="0.22"/>
</svg>

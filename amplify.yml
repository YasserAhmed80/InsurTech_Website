version: 1
applications:
  - appRoot: Frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
          env:
            - GOOGLE_SERVICE_ACCOUNT_EMAIL
            - GOOGLE_PRIVATE_KEY
            - GOOGLE_SHEET_ID
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
